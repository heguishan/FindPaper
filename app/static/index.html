<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FindPaper</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <div class="header">
          <div>
            <h1>FindPaper</h1>
            <p>开放学术文献检索、PDF 下载与高质量筛选</p>
          </div>
          <span class="badge">Local Web App</span>
        </div>
        <div id="config-banner" class="config-banner"></div>

        <form id="job-form" class="form">
          <label>
            <span>主题/关键词</span>
            <textarea
              name="topic"
              rows="4"
              placeholder="例如：载流子俘获 或 carrier capture"
            ></textarea>
          </label>

          <label>
            <span>领域限定</span>
            <input
              name="field_hint"
              type="text"
              placeholder="例如：半导体缺陷物理 / 光电材料 / 宽禁带半导体"
            />
          </label>

          <div class="grid">
            <label>
              <span>上传论文 PDF</span>
              <input name="paper_pdf" type="file" accept="application/pdf" />
            </label>
            <label>
              <span>目标下载数量</span>
              <input name="target_count" type="number" min="1" max="100" value="10" />
            </label>
          </div>

          <section id="plan-panel" class="plan-panel hidden">
            <div class="status-header">
              <h2>检索方案</h2>
              <span id="plan-confidence" class="badge">未生成</span>
            </div>
            <label>
              <span>确认后的最终查询</span>
              <textarea name="final_query" rows="3" placeholder="生成检索方案后会填入推荐查询"></textarea>
            </label>
            <div class="grid">
              <label>
                <span>检索模式</span>
                <select name="search_mode">
                  <option value="fast" selected>快速检索</option>
                  <option value="deep">深度检索</option>
                </select>
              </label>
            </div>
            <div id="plan-summary" class="plan-summary"></div>
            <div id="query-options" class="query-options"></div>
          </section>

          <label>
            <span>输出目录</span>
            <input name="output_dir" type="text" placeholder="留空则使用默认 downloads 目录" />
          </label>

          <div class="actions">
            <button id="plan-button" type="button">生成检索方案</button>
            <button id="submit-button" type="submit">开始检索下载</button>
          </div>
        </form>
      </section>

      <section class="panel status-panel">
        <div class="status-header">
          <h2>任务状态</h2>
          <span id="status-pill" class="status-pill idle">Idle</span>
        </div>
        <div class="metrics">
          <div><strong id="downloaded-count">0</strong><span>成功下载</span></div>
          <div><strong id="failed-count">0</strong><span>无法下载</span></div>
          <div><strong id="quality-count">0</strong><span>高质量</span></div>
        </div>
        <pre id="log" class="log">等待任务开始。</pre>
        <div id="result" class="result"></div>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
